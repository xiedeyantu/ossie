name: tpcds_retail_model
description: TPC-DS retail semantic model for sales and customer analytics
tables:
- name: store_sales
  base_table:
    database: TPCDS
    schema: PUBLIC
    table: STORE_SALES
  primary_key:
    columns:
    - ss_item_sk
    - ss_ticket_number
  unique_keys:
  - columns:
    - ss_item_sk
    - ss_ticket_number
  description: Fact table containing all store sales transactions
  synonyms:
  - sales transactions
  - store purchases
  - retail sales
  - POS data
  dimensions:
  - name: ss_sold_date_sk
    expr: ss_sold_date_sk
    description: Foreign key to date dimension
    synonyms:
    - sale date
    - transaction date
  - name: ss_item_sk
    expr: ss_item_sk
    description: Foreign key to item dimension
    synonyms:
    - product
    - item
  - name: ss_customer_sk
    expr: ss_customer_sk
    description: Foreign key to customer dimension
    synonyms:
    - customer
    - buyer
  - name: ss_store_sk
    expr: ss_store_sk
    description: Foreign key to store dimension
    synonyms:
    - store
    - location
  facts:
  - name: ss_quantity
    expr: ss_quantity
    description: Quantity of items sold
    synonyms:
    - units sold
    - quantity
  - name: ss_sales_price
    expr: ss_sales_price
    description: Sales price per unit
    synonyms:
    - unit price
    - price
  - name: ss_ext_sales_price
    expr: ss_ext_sales_price
    description: Extended sales price (quantity * price)
    synonyms:
    - total price
    - line total
  - name: ss_net_profit
    expr: ss_net_profit
    description: Net profit from the sale
    synonyms:
    - profit
    - margin
- name: date_dim
  base_table:
    database: TPCDS
    schema: PUBLIC
    table: DATE_DIM
  primary_key:
    columns:
    - d_date_sk
  unique_keys:
  - columns:
    - d_date_sk
  description: Date dimension with calendar attributes
  synonyms:
  - calendar
  - dates
  - time periods
  dimensions:
  - name: d_date_sk
    expr: d_date_sk
    description: Surrogate key for date
  time_dimensions:
  - name: d_date
    expr: d_date
    description: Actual date value
    synonyms:
    - date
    - calendar date
  - name: d_year
    expr: d_year
    description: Year
    synonyms:
    - year
  - name: d_quarter_name
    expr: d_quarter_name
    description: Quarter name (e.g., 2024Q1)
    synonyms:
    - quarter
    - fiscal quarter
  - name: d_month_name
    expr: d_month_name
    description: Month name
    synonyms:
    - month
- name: customer
  base_table:
    database: TPCDS
    schema: PUBLIC
    table: CUSTOMER
  primary_key:
    columns:
    - c_customer_sk
  unique_keys:
  - columns:
    - c_customer_sk
  description: Customer dimension with demographic information
  synonyms:
  - customers
  - shoppers
  - buyers
  dimensions:
  - name: c_customer_sk
    expr: c_customer_sk
    description: Surrogate key for customer
  - name: c_customer_id
    expr: c_customer_id
    description: Business key for customer
    synonyms:
    - customer ID
    - customer number
  - name: c_first_name
    expr: c_first_name
    description: Customer first name
  - name: c_last_name
    expr: c_last_name
    description: Customer last name
  - name: customer_full_name
    expr: c_first_name || ' ' || c_last_name
    description: Customer full name (computed field)
    synonyms:
    - full name
    - customer name
  - name: c_email_address
    expr: c_email_address
    description: Customer email address
    synonyms:
    - email
    - contact
- name: item
  base_table:
    database: TPCDS
    schema: PUBLIC
    table: ITEM
  primary_key:
    columns:
    - i_item_sk
  unique_keys:
  - columns:
    - i_item_sk
  description: Item/Product dimension with product attributes
  synonyms:
  - products
  - items
  - merchandise
  dimensions:
  - name: i_item_sk
    expr: i_item_sk
    description: Surrogate key for item
  - name: i_item_id
    expr: i_item_id
    description: Business key for item
    synonyms:
    - item ID
    - product ID
    - SKU
  - name: i_item_desc
    expr: i_item_desc
    description: Item description
    synonyms:
    - product description
    - item name
  - name: i_brand
    expr: i_brand
    description: Brand name
    synonyms:
    - brand
    - manufacturer
  - name: i_category
    expr: i_category
    description: Item category
    synonyms:
    - product category
    - department
  - name: i_current_price
    expr: i_current_price
    description: Current price of the item
    synonyms:
    - price
    - list price
- name: store
  base_table:
    database: TPCDS
    schema: PUBLIC
    table: STORE
  primary_key:
    columns:
    - s_store_sk
  unique_keys:
  - columns:
    - s_store_id
  description: Store dimension with location and store attributes
  synonyms:
  - stores
  - retail locations
  - branches
  dimensions:
  - name: s_store_sk
    expr: s_store_sk
    description: Surrogate key for store
  - name: s_store_id
    expr: s_store_id
    description: Business key for store
    synonyms:
    - store ID
    - store number
  - name: s_store_name
    expr: s_store_name
    description: Store name
    synonyms:
    - store name
    - location name
  - name: s_city
    expr: s_city
    description: City where store is located
    synonyms:
    - city
    - location
  - name: s_state
    expr: s_state
    description: State where store is located
    synonyms:
    - state
    - region
  facts:
  - name: s_number_employees
    expr: s_number_employees
    description: Number of employees at the store
    synonyms:
    - employee count
    - staff size
relationships:
- name: store_sales_to_date
  left_table: store_sales
  right_table: date_dim
  relationship_columns:
  - left_column: ss_sold_date_sk
    right_column: d_date_sk
- name: store_sales_to_customer
  left_table: store_sales
  right_table: customer
  relationship_columns:
  - left_column: ss_customer_sk
    right_column: c_customer_sk
- name: store_sales_to_item
  left_table: store_sales
  right_table: item
  relationship_columns:
  - left_column: ss_item_sk
    right_column: i_item_sk
- name: store_sales_to_store
  left_table: store_sales
  right_table: store
  relationship_columns:
  - left_column: ss_store_sk
    right_column: s_store_sk
metrics:
- name: total_sales
  expr: SUM(store_sales.ss_ext_sales_price)
  description: Total sales revenue across all transactions
  synonyms:
  - total revenue
  - gross sales
  - sales amount
- name: total_profit
  expr: SUM(store_sales.ss_net_profit)
  description: Total net profit from store sales
  synonyms:
  - net profit
  - total earnings
  - profit
- name: customer_lifetime_value
  expr: SUM(store_sales.ss_ext_sales_price) / COUNT(DISTINCT customer.c_customer_sk)
  description: Average lifetime sales value per customer
  synonyms:
  - CLV
  - LTV
  - customer value
  - lifetime revenue
- name: sales_by_brand
  expr: SUM(store_sales.ss_ext_sales_price)
  description: Total sales by brand (requires grouping by item.i_brand)
  synonyms:
  - brand sales
  - brand performance
  - brand revenue
- name: store_productivity
  expr: SUM(store_sales.ss_ext_sales_price) / NULLIF(SUM(store.s_number_employees),
    0)
  description: Sales per employee across stores
  synonyms:
  - sales per employee
  - employee productivity
  - revenue per employee
