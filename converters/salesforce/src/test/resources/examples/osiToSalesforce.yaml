version: 0.2.0.dev0
semantic_model:
  - name: Customer_Orders_Model
    description: Example model demonstrating calculated dimensions with single and multiple
      data object dependencies
    custom_extensions:
    - vendor_name: SALESFORCE
      data: |-
        {
          "dataspace" : "default"
        }
    datasets:
    - description: Customer master data
      name: Customers
      source: Customers__dll
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Customers",
            "dataObjectType" : "Dlo"
          }
      fields:
      - name: customer_id
        label: Customer ID
        description: Unique customer identifier
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: customer_id__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text",
              "displayCategory" : "Discrete"
            }
      - name: email
        label: Email
        description: Customer email address
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: email__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Email"
            }
      - name: total_purchases
        label: Total Purchases
        description: Lifetime purchase count
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: total_purchases__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Number",
              "aggregationType" : "Sum",
              "displayCategory" : "Continuous"
            }
      - name: lifetime_value
        label: Lifetime Value
        description: Total customer value
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: lifetime_value__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Currency",
              "aggregationType" : "Sum"
            }
      - name: customer_email_domain
        label: Customer Email Domain
        description: Customer Email Domain
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: SUBSTRING([Customers].[email], POSITION('@' IN [Customers].[email])
              + 1, LENGTH([Customers].[email]))
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text"
            }
    - description: Order transaction data
      name: Orders
      source: Orders__dll
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Orders",
            "dataObjectType" : "Dlo"
          }
      fields:
      - name: order_id
        label: Order ID
        description: Unique order identifier
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: order_id__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text"
            }
      - name: customer_id
        label: Customer ID
        description: Foreign key to Customers
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: customer_id__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text",
              "displayCategory" : "Discrete",
              "isVisible" : true,
              "sortOrder" : "Ascending"
            }
      - name: product_id
        label: Product ID
        description: Foreign key to Products
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: product_id__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text",
              "displayCategory" : "Discrete",
              "isVisible" : true,
              "sortOrder" : "Ascending"
            }
      - name: order_date
        label: Order Date
        description: Date when order was placed
        dimension:
          is_time: true
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: order_date__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Date",
              "displayCategory" : "Discrete",
              "isVisible" : true,
              "sortOrder" : "Descending"
            }
      - name: amount
        label: Amount
        description: Order amount in currency
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: amount__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Currency",
              "aggregationType" : "Sum"
            }
      - name: quantity
        label: Quantity
        description: Number of items ordered
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: quantity__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Number",
              "aggregationType" : "Sum"
            }
      - name: order_year
        label: Order Year
        description: Order Year
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: YEAR([Orders].[order_date])
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Number",
              "displayCategory" : "Discrete"
            }
    - description: Product catalog data
      name: Products
      source: Products__dll
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Products",
            "dataObjectType" : "Dlo"
          }
      fields:
      - name: product_id
        label: Product ID
        description: Unique product identifier
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: product_id__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text",
              "displayCategory" : "Discrete",
              "isVisible" : true,
              "sortOrder" : "Ascending"
            }
      - name: product_name
        label: Product Name
        description: Product display name
        dimension:
          is_time: false
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: product_name__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Text",
              "displayCategory" : "Discrete",
              "isVisible" : true,
              "sortOrder" : "Ascending"
            }
      - name: unit_price
        label: Unit Price
        description: Price per unit
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: unit_price__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Currency"
            }
      - name: stock_level
        label: Stock Level
        description: Current inventory count
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: stock_level__c
        custom_extensions:
        - vendor_name: SALESFORCE
          data: |-
            {
              "dataType" : "Number",
              "aggregationType" : "Sum",
              "displayCategory" : "Continuous",
              "isVisible" : true,
              "isAggregatable" : true,
              "shouldTreatNullsAsZeros" : false,
              "decimalPlace" : 0
            }
    relationships:
    - name: Customers_Orders
      from: Customers
      to: Orders
      from_columns:
      - customer_id
      to_columns:
      - customer_id
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Customers to Orders",
            "cardinality" : "OneToMany",
            "joinType" : "Auto",
            "isEnabled" : true
          }
    - name: Orders_Products
      from: Orders
      to: Products
      from_columns:
      - product_id
      to_columns:
      - product_id
    - name: Customers_ByDomain
      from: Customers
      to: Orders
      from_columns:
      - customer_email_domain
      to_columns:
      - order_id
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Invalid Relationship - Uses Calculated Field"
          }
    - name: Orders_ByYear
      from: Orders
      to: Products
      from_columns:
      - order_year
      to_columns:
      - product_id
      custom_extensions:
      - vendor_name: SALESFORCE
        data: |-
          {
            "label" : "Invalid Relationship - Uses Calculated Field",
            "cardinality" : "ManyToMany",
            "joinType" : "Auto",
            "isEnabled" : true
          }
    metrics:
    - description: Sum of all order amounts
      name: total_revenue
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: SUM([Orders].[amount])
    - description: Average amount per order
      name: avg_order_value
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: AVG([Orders].[amount])
